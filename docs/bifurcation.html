    <main role="main"><article id="section4"><h1>4. 分岐</h1>
        <p>力学系において, 解の挙動は平衡点やリミットサイクルの存在, およびその安定性に強く影響される. 
            力学系にパラメータが含まれている場合, そのパラメータを動かしたとき, 例えばある臨界値を境に平衡点が新たに現れる, 消滅するといったことが起こり得る. 
            一般に, 力学系では臨界点付近のパラメータの変化により, 解の挙動の劇的な違いを説明することができるが, このような現象は力学系の <b>分岐</b> と呼ばる.
